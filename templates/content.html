<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            Tejas Virtual Classroom
        </div>

        <div class="nav-links">

            <a href="{{ url_for('home') }}">
                Home
            </a>

            <a href="{{ url_for('content') }}">
                Courses
            </a>

            <a href="{{ url_for('login') }}">
                Login
            </a>

            <a href="{{ url_for('register') }}">
                Register
            </a>

        </div>

    </nav>

    <section class="page-header">

        <h1>
            Explore Courses
        </h1>

        <p>
            Learn new skills with interactive course materials
        </p>

    </section>

    <main class="course-container">

        {% for course in courses %}

        <div class="course-card">

            <div class="course-icon">
                📘
            </div>

            <h2>
                {{ course.title }}
            </h2>

            <p>
                Access complete course materials and start learning now.
            </p>

            <a
                href="{{ course.pdf }}"
                target="_blank"
                class="course-btn"
            >
                Enroll Now
            </a>

        </div>

        {% endfor %}

    </main>

</body>
</html>
